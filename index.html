<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVR Properties</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">
        <h2>MVR Properties</h2>
    </div>

    <nav>

        <a href="#">Home</a>

        <a href="#">Properties</a>

        <a href="#">Layouts</a>

        <a href="#">Contact</a>

        <a href="admin.html" class="admin-btn">
            Admin Login
        </a>

    </nav>

</header>

<section class="hero">

    <div class="hero-content">

        <h1>Find Your Dream Property</h1>

        <p>
            Buy and Sell Open Plots, Villas,
            Apartments and Farm Lands.
        </p>

        <a href="#properties" class="hero-btn">
            Explore Properties
        </a>

    </div>

</section>
<section class="search">

    <h2>Search Properties</h2>

    <div class="search-box">

        <input type="text" placeholder="Search by Location">

        <select>
            <option>Property Type</option>
            <option>Open Plot</option>
            <option>House</option>
            <option>Apartment</option>
            <option>Farm Land</option>
        </select>

        <button>Search</button>

    </div>

</section>

<section id="properties" class="properties">

    <h2>Featured Properties</h2>

    <div class="cards">

    </div>

</section>
<a href="#" class="add-property-btn" onclick="openPopup(); return false;">
    + Add Property
</a>



<div class="popup" id="popup">

    <div class="popup-content">

        <h2>Add Property</h2>

        <input type="text" placeholder="Property Title">

        <input type="text" placeholder="Layout Name">

        <input type="number" placeholder="Price">

        <input type="number" placeholder="Price per Sq.Yard">

        <input type="text" placeholder="Location">

        <input type="text" placeholder="Google Maps Link">

        <textarea placeholder="Property Description"></textarea>

        <input type="file" multiple accept="image/*">

        <button>Preview</button>

        <button id="publishBtn">Publish Property</button>

    </div>

</div>
<div id="properties-list"></div>    
<footer>

    <h3>MVR Properties</h3>

    <p>
        © 2026 MVR Properties. All Rights Reserved.
    </p>

</footer>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  // For Firebase JS SDK v7.20.0 and later, measurementId is optionalb
  apiKey: "AIzaSyBIZu72FH8V95Fz-irq5g5gIdqNNxHsuMA",
  authDomain: "mvr-properties.firebaseapp.com",
  projectId: "mvr-properties",
  storageBucket: "mvr-properties.firebasestorage.app",
  messagingSenderId: "690024128026",
  appId: "1:690024128026:web:bcdf9244462c7d4bfafba3",
  measurementId: "G-RKQS005PHT"
};
  

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
const publishBtn = document.getElementById("publishBtn");

publishBtn.addEventListener("click", async () => {
  try {

    await addDoc(collection(db, "properties"), {
      title: document.querySelector('input[placeholder="Property Title"]').value,
      layout: document.querySelector('input[placeholder="Layout Name"]').value,
      price: document.querySelector('input[placeholder="Price"]').value,
      location: document.querySelector('input[placeholder="Location"]').value,
      maps: document.querySelector('input[placeholder="Google Maps Link"]').value,
      description: document.querySelector('textarea').value,
      createdAt: new Date()
    });

    alert("Property Published Successfully!");

    closePopup();

  } catch (error) {
    console.error(error);
    alert("Failed to publish property.");
  }
});    
</script>
<script src="script.js"></script>

</body>
</html>
